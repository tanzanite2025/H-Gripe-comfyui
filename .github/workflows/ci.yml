name: CI

on:
  push:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  # Opt-in end-to-end check that actually runs ViTMatte: the ~104 MB weight is
  # never committed, so the gated `vitmatte_inference_when_weight_present` test
  # skips on every normal run. Trigger this manually to fetch the weight and
  # exercise the real `ort` inference path.
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  studio-ui:
    name: studio-ui (test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop-tauri/studio-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/desktop-tauri/studio-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build (tsc + vite)
        run: npm run build

  tauri-rust:
    name: tauri (cargo test)
    runs-on: windows-latest
    steps:
      # lfs: true pulls the vendored FFmpeg import libs/DLLs under
      # third_party/ffmpeg that the native-ffmpeg feature links against.
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/desktop-tauri/studio-ui/package-lock.json

      # The Tauri build script embeds the frontend at compile time, so the
      # studio-ui bundle (apps/desktop-tauri/dist) must exist before cargo test.
      - name: Build frontend
        working-directory: apps/desktop-tauri
        run: npm --prefix studio-ui ci && npm --prefix studio-ui run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop-tauri/src-tauri

      - name: cargo test
        working-directory: apps/desktop-tauri/src-tauri
        # --features native-ffmpeg links + smoke-tests the vendored libav decoder
        # (build.rs copies the runtime DLLs next to the test binaries).
        run: cargo test --features native-ffmpeg

  vitmatte-e2e:
    name: tauri (vitmatte e2e)
    # Only on manual dispatch: fetches the ~104 MB weight and runs the real
    # ViTMatte inference test. Kept out of the per-PR matrix to avoid the
    # download on every run while still giving a verifiable execution path.
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/desktop-tauri/studio-ui/package-lock.json

      # The Tauri build script embeds the frontend at compile time, so the
      # studio-ui bundle (apps/desktop-tauri/dist) must exist before cargo test.
      - name: Build frontend
        working-directory: apps/desktop-tauri
        run: npm --prefix studio-ui ci && npm --prefix studio-ui run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop-tauri/src-tauri

      # Fetches into resources/models/vitmatte.onnx (sha256-checked), which
      # resolve_model_file picks up in-repo so the gated test stops skipping.
      - name: Fetch ViTMatte weight
        shell: bash
        run: bash scripts/fetch-vitmatte.sh

      - name: cargo test (vitmatte inference)
        working-directory: apps/desktop-tauri/src-tauri
        run: cargo test vitmatte_inference_when_weight_present -- --nocapture

  python-bridge:
    name: python bridge (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install runtime + test deps
        run: pip install Pillow numpy pytest attrs

      - name: Run bridge tests
        run: python -m pytest python/bridge/tests -q

  python-bridge-onnx:
    name: python bridge (onnx inference)
    # Real-inference lane for the opt-in ONNX engines (matting / colour
    # harmonise / defect): the per-engine `requires_onnx` tests synthesise a
    # tiny ONNX model and exercise the actual `ort` session path (incl.
    # `sr_backends.onnx_providers` execution-provider selection), so they only
    # run where `onnx` + `onnxruntime` are importable. The default
    # `python-bridge` lane installs neither, so they skip there; this lane adds
    # them. Unlike the ViTMatte e2e job it needs no weight download (the model
    # is synthesised), so it stays in the per-PR matrix rather than dispatch.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install runtime + test deps (incl. ONNX)
        run: pip install Pillow numpy pytest attrs onnx onnxruntime

      - name: Run bridge tests (gated ONNX inference active)
        run: python -m pytest python/bridge/tests -q
