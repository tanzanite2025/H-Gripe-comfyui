[package]
edition = "2021"
rust-version = "1.61.0"
name = "camino"
version = "1.2.4"
authors = [
    "Without Boats <saoirse@without.boats>",
    "Ashley Williams <ashley666ashley@gmail.com>",
    "Steve Klabnik <steve@steveklabnik.com>",
    "Rain <rain@sunshowers.io>",
]
build = "build.rs"
exclude = [
    ".cargo/**/*",
    ".github/**/*",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "UTF-8 paths"
documentation = "https://docs.rs/camino"
readme = "README.md"
keywords = [
    "paths",
    "utf8",
    "unicode",
    "filesystem",
]
categories = [
    "development-tools",
    "filesystem",
    "os",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/camino-rs/camino"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg=doc_cfg"]

[[package.metadata.release.pre-release-replacements]]
file = "CHANGELOG.md"
search = "Unreleased"
replace = "[{{version}}]"
min = 1

[[package.metadata.release.pre-release-replacements]]
file = "CHANGELOG.md"
search = "ReleaseDate"
replace = "{{date}}"
min = 1

[[package.metadata.release.pre-release-replacements]]
file = "CHANGELOG.md"
search = "<!-- next-header -->"
replace = """
